        .assignments-hero {
            padding: 180px 0 80px;
            text-align: center;
            background: linear-gradient(to bottom, #0d0d0d, var(--dark-bg));
            border-bottom: 1px solid #1a1a1a;
        }
        .assignments-hero h1 { font-size: 3rem; text-transform: uppercase; letter-spacing: 4px; }
        .assignments-hero h1 span { color: var(--primary-color); }
        .assignments-hero p { color: var(--text-muted); margin-top: 15px; font-size: 1rem; letter-spacing: 1px; }

        .assignments-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 700px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .assignment-link {
            display: flex;
            align-items: center;
            justify-content: space-between;

            border: 1px solid #222;
            border-radius: 12px;

            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s ease, transform 0.3s ease, background 0.3s ease;
        }

        .assignment-link::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px;
            height: 100%;
            background: var(--primary-color);
        }

        .assignment-link:hover {
            border-color: var(--primary-color);
            transform: translateX(6px);
            background: #1a1a1a;
            color: var(--primary-color);
        }

            font-size: 0.75rem;
            color: #333;
            font-weight: 900;
            margin-right: 20px;
            flex-shrink: 0;
        }
